    <script>
    // ==================== GLOBAL STATE ====================
    let matchesData = [];
    let syncMeta = null;
    let historyData = [];
    let currentPage = 'home';
    let selectedDate = 'today';
    let selectedLeague = ''; // 赛事筛选 ('' = 全部)
    let expandedMatchId = null;
    let detailMatchId = null;
    let historyPage = 1;
    const HISTORY_PAGE_SIZE = 20;
    let challengeSelections = {};
    let betslipGenerated = null;
    let worldcupData = null;
    let homeRenderTimer = null; // BUG-04 fix: track setTimeout

    // ==================== 用户系统 ====================
    // 用户数据存储在 localStorage，按用户名隔离
    function getUsers() {
      try { return JSON.parse(localStorage.getItem('fp_users') || '{}'); } catch { return {}; }
    }
    function saveUsers(users) {
      try {
        localStorage.setItem('fp_users', JSON.stringify(users));
      } catch (e) {
        console.error('保存用户数据失败 (存储空间可能已满):', e);
        alert('保存失败，存储空间可能已满。请清理部分数据后重试。');
      }
    }
    function getCurrentUser() {
      return localStorage.getItem('fp_current_user') || null;
    }
    function setCurrentUser(username) {
      if (username) localStorage.setItem('fp_current_user', username);
      else localStorage.removeItem('fp_current_user');
    }
    function getUserData(username) {
      const users = getUsers();
      return users[username] || { challenges: [], betslips: [] };
    }
    function saveUserData(username, data) {
      const users = getUsers();
      users[username] = data;
      saveUsers(users);
    }
    // 获取今天日期字符串 (用于命中挑战按天隔离)
    function getTodayKey() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    // 注册
    function registerUser(username, password) {
      if (!username || !password) return '请输入用户名和密码';
      if (password.length < 4) return '密码长度不能少于 4 位';
      const users = getUsers();
      if (users[username]) return '用户名已存在';
      users[username] = { password: md5(password), challenges: [], betslips: [] };
      saveUsers(users);
      setCurrentUser(username);
      return null; // 成功
    }
    // 登录
    function loginUser(username, password) {
      if (!username || !password) return '请输入用户名和密码';
      const users = getUsers();
      if (!users[username]) return '用户不存在';
      if (users[username].password !== md5(password)) return '密码错误';
      setCurrentUser(username);
      return null;
    }
    // 退出
    function logoutUser() {
      setCurrentUser(null);
      renderPage();
    }

    // ==================== UTILITIES ====================
    function formatTime(isoStr) {
      if (!isoStr) return '--:--';
      const d = new Date(isoStr);
      const utc = d.getTime() + d.getTimezoneOffset() * 60000;
      const tz = getTimezone();
      const local = new Date(utc + tz.offset * 3600000);
      return String(local.getHours()).padStart(2, '0') + ':' + String(local.getMinutes()).padStart(2, '0');
    }
    function formatDateShort(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const utc = d.getTime() + d.getTimezoneOffset() * 60000;
      const tz = getTimezone();
      const local = new Date(utc + tz.offset * 3600000);
      return (local.getMonth() + 1) + '/' + local.getDate();
    }
    function formatDateCN(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const utc = d.getTime() + d.getTimezoneOffset() * 60000;
      const tz = getTimezone();
      const local = new Date(utc + tz.offset * 3600000);
      return (local.getMonth() + 1) + '月' + local.getDate() + '日';
    }
    function formatRelativeTime(isoStr) {
      const diff = Date.now() - new Date(isoStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return mins + ' 分钟前';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + ' 小时前';
      return Math.floor(hrs / 24) + ' 天前';
    }
    function getHandicapDisplay(line) {
      if (line === 0) return '0';
      return line > 0 ? '+' + line : '' + line;
    }
    function getSignalLabel(pred) {
      if (!pred) return { text: '—', cls: 'is-unavailable' };
      const map = { '1': ['主胜','is-steady'], 'X': ['平局','is-steady'], '2': ['客胜','is-steady'],
        'O2.5': ['大2.5','is-steady'], 'U2.5': ['小2.5','is-steady'], 'BTTS': ['双方进球','is-steady'],
        'WATCH': ['观察','is-watch'], 'AVOID': ['回避','is-avoid'] };
      const [text, cls] = map[pred.tipCode] || [pred.tipCode, ''];
      return { text, cls };
    }
    function getTrustColor(score) {
      if (score >= 75) return 'var(--success)';
      if (score >= 55) return 'var(--premium)';
      return 'var(--danger)';
    }
    function getBestPrediction(match) {
      if (!match.predictions?.length) return null;
      return match.predictions.reduce((best, p) => (p.trustScore > (best?.trustScore || 0)) ? p : best, null);
    }
    function getTeamBadgeHtml(name, logo, logoType, color) {
      const safeName = escapeHtml(name || '');
      const initial = name ? name.charAt(0) : '?';
      const c = color || '#666';
      // 国旗类型
      if (logoType === 'flag' || (logo && logo.includes('flagcdn'))) {
        const iso = logo ? logo.match(/\/([a-z]{2}(?:-[a-z]+)?)\.\w+$/)?.[1] : '';
        const url = iso ? 'https://flagcdn.com/w80/' + iso + '.png' : '';
        if (url) {
          return '<span class="team-badge team-badge-flag" style="--team-color:' + c + '"><img src="' + url + '" alt="' + safeName + '" loading="lazy" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'' + initial + '\'" /></span>';
        }
        return '<span class="team-badge team-badge-flag" style="--team-color:' + c + '">' + initial + '</span>';
      }
      // 队徽类型 (必须是 http 开头的有效 URL)
      if (logoType === 'crest' && logo && (logo.startsWith('http://') || logo.startsWith('https://'))) {
        return '<span class="team-badge team-badge-crest" style="--team-color:' + c + '"><img src="' + escapeHtml(logo) + '" alt="' + safeName + '" loading="lazy" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'' + initial + '\'" /></span>';
      }
      // 默认: 显示首字
      return '<span class="team-badge" style="--team-color:' + c + '">' + initial + '</span>';
    }
    function escapeHtml(s) {
      return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
    }
    function escapeJs(s) {
      return s ? s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r') : '';
    }

    // ==================== 页面刷新 ====================
    function refreshCurrentPage() {
      const page = currentPage;
      if (page === 'home' || page === 'challenge') {
        // 刷新赛事数据
        fetch('./data/matches-current.json?v=' + Date.now())
          .then(r => r.json()).then(d => { matchesData = d; settleChallenges(); renderPage(); });
      } else if (page === 'history') {
        // 刷新历史数据
        fetch('./data/matches-history.json?v=' + Date.now())
          .then(r => r.json()).then(d => { historyData = d; renderPage(); });
      } else if (page === 'worldcup') {
        // 刷新世界杯数据
        fetch('./data/worldcup.json?v=' + Date.now())
          .then(r => r.json()).then(d => { worldcupData = d; renderPage(); });
      } else if (page === 'detail') {
        // 刷新所有数据
        Promise.all([
          fetch('./data/matches-current.json?v=' + Date.now()).then(r => r.json()),
          fetch('./data/matches-history.json?v=' + Date.now()).then(r => r.json()),
        ]).then(([c, h]) => { matchesData = c; historyData = h; settleChallenges(); renderPage(); });
      } else {
        renderPage();
      }
    }

    function refreshBtnHtml(small) {
      const size = small ? '12' : '14';
      const style = small ? 'font-size:.78rem' : '';
      return '<button class="btn btn-secondary" style="padding:.3rem .6rem;' + style + '" onclick="refreshCurrentPage()">' +
        '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>' +
        (small ? '' : ' 刷新') + '</button>';
    }

    // ==================== NAVIGATION ====================
    function navigateTo(page, params) {
      currentPage = page;
      if (params) {
        if (params.matchId) detailMatchId = params.matchId;
        if (params.date) selectedDate = params.date;
      }
      // Update nav active state
      document.querySelectorAll('.nav-link').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });
      renderPage();
      window.scrollTo(0, 0);
    }

    function renderPage() {
      const el = document.getElementById('pageContent');
      updateNavUser();
      switch (currentPage) {
        case 'home': el.innerHTML = renderHomePage(); break;
        case 'history': el.innerHTML = renderHistoryPage(); break;
        case 'betslip': el.innerHTML = renderBetslipPage(); break;
        case 'challenge': el.innerHTML = renderChallengePage(); break;
        case 'worldcup': el.innerHTML = renderWorldCupPage(); break;
        case 'detail': el.innerHTML = renderDetailPage(); break;
        case 'mine': el.innerHTML = renderMinePage(); break;
        default: el.innerHTML = renderHomePage();
      }
    }

    // ==================== PAGE: HOME (赛事预测) ====================
    function renderHomePage() {
      let html = '';
      // Notice banner
      html += '<div class="notice-banner"><div class="notice-copy">';
      html += '<div class="notice-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>';
      html += '<div class="notice-text"><strong>理性提示</strong>：本平台仅提供数据分析与预测参考，不保证赛果。请保持娱乐心态，禁止未成年人参与，切勿盲目跟单。</div>';
      html += '</div></div>';

      // Metrics
      html += '<div class="metrics-grid" id="metricsGrid"></div>';
      // Sync strip + refresh
      html += '<div style="display:flex;gap:.5rem;align-items:stretch">';
      html += '<div class="data-sync-strip is-ready" id="syncStrip" style="flex:1"></div>';
      html += refreshBtnHtml(true);
      html += '</div>';
      // Date toolbar + league filter + timezone
      html += '<div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">';
      html += '<div class="date-toolbar" id="dateToolbar" style="flex:1;min-width:0"></div>';
      html += leagueFilterHtml();
      html += timezoneSelectorHtml();
      html += '</div>';
      // League stack
      html += '<div class="league-stack" id="leagueStack"></div>';

      // Render after DOM update (clear previous timer to avoid race condition)
      if (homeRenderTimer) clearTimeout(homeRenderTimer);
      homeRenderTimer = setTimeout(() => {
        homeRenderTimer = null;
        renderMetrics();
        renderSyncStrip();
        renderDateToolbar();
        renderLeagueStack();
      }, 10);
      return html;
    }

    function renderMetrics() {
      const grid = document.getElementById('metricsGrid');
      if (!grid) return;
      // 使用筛选后的数据统计
      const filtered = getFilteredMatches();
      const total = filtered.length;
      const withOdds = filtered.filter(m => m.odds).length;
      const withPred = filtered.filter(m => m.predictions?.length > 0).length;
      const highTrust = filtered.filter(m => { const b = getBestPrediction(m); return b && b.trustScore >= 70; }).length;
      grid.innerHTML = [
        { icon: '📊', label: '今日赛事', value: total, note: '场待分析', accent: '' },
        { icon: '📈', label: '已接赔率', value: withOdds, note: '场有 SP 数据', accent: 'accent' },
        { icon: '🎯', label: '已出预测', value: withPred, note: '场有推荐', accent: 'premium' },
        { icon: '✅', label: '高可信候选', value: highTrust, note: '场 ≥70 分', accent: 'success' },
      ].map(m => '<div class="metric-card"><div class="metric-head"><div class="metric-icon ' + m.accent + '">' + m.icon + '</div><span class="metric-label">' + m.label + '</span></div><span class="metric-value">' + m.value + '</span><span class="metric-note">' + m.note + '</span></div>').join('');
    }

    function renderSyncStrip() {
      const strip = document.getElementById('syncStrip');
      if (!strip) return;
      if (!syncMeta) { strip.innerHTML = '<div class="data-sync-copy"><span>数据加载中...</span></div>'; return; }
      strip.innerHTML = '<div class="data-sync-copy"><span class="data-sync-dot"></span><span><strong>' + formatRelativeTime(syncMeta.updatedAt) + '</strong> 同步 · ' + (syncMeta.source || 'sporttery') + '</span></div>' +
        '<div class="data-sync-items"><span>当前 <strong>' + (syncMeta.files?.current || 0) + '</strong> 场</span><span>历史 <strong>' + (syncMeta.files?.history || 0) + '</strong> 场</span><span>球队 <strong>' + (syncMeta.files?.teams || 0) + '</strong> 支</span></div>';
    }

    function renderDateToolbar() {
      const toolbar = document.getElementById('dateToolbar');
      if (!toolbar) return;
      const dates = [...new Set(matchesData.map(m => m.kickoffDate || formatDateCN(m.kickoffTime)))];
      const today = new Date();
      let html = '<div class="date-quick-row">';
      html += '<button class="date-chip ' + (selectedDate === 'today' ? 'active' : '') + '" onclick="selectDate(\'today\')"><span class="date-label">今天</span><span class="date-value">' + formatDateCN(today.toISOString()) + '</span></button>';
      dates.forEach(d => {
        html += '<button class="date-chip ' + (selectedDate === d ? 'active' : '') + '" onclick="selectDate(\'' + d + '\')"><span class="date-label">' + d + '</span></button>';
      });
      html += '</div>';
      toolbar.innerHTML = html;
    }

    function selectDate(date) {
      selectedDate = date;
      renderDateToolbar();
      renderLeagueStack();
    }

    function getFilteredMatches() {
      // 赛事预测页只显示未开始的比赛
      let filtered = matchesData.filter(m => m.status !== 'FINISHED');
      // 按日期筛选
      if (selectedDate !== 'today') {
        filtered = filtered.filter(m => {
          const d = m.kickoffDate || formatDateCN(m.kickoffTime);
          return d === selectedDate;
        });
      }
      // 按赛事筛选
      if (selectedLeague) {
        filtered = filtered.filter(m => m.leagueName === selectedLeague);
      }
      return filtered;
    }

    function renderLeagueStack() {
      const stack = document.getElementById('leagueStack');
      if (!stack) return;
      const filtered = getFilteredMatches();
      if (!filtered.length) {
        stack.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg><p>该日期暂无赛事数据</p></div>';
        return;
      }
      const groups = {};
      filtered.forEach(m => {
        const key = m.leagueName || '未知赛事';
        if (!groups[key]) groups[key] = { name: key, country: m.countryName || '', matches: [] };
        groups[key].matches.push(m);
      });
      let html = '';
      Object.values(groups).forEach(league => {
        html += '<div class="league-card"><div class="league-header"><div class="league-title"><strong>' + league.name + '</strong></div><span class="league-meta">' + league.country + '</span><span class="league-count">' + league.matches.length + ' 场</span></div>';
        html += '<div class="table-scroll"><table class="responsive-table"><thead><tr><th>时间</th><th>主队</th><th>预测</th><th>客队</th><th>胜平负</th><th>让球</th><th>操作</th></tr></thead><tbody>';
        league.matches.forEach(m => { html += renderMatchRow(m); });
        html += '</tbody></table></div></div>';
      });
      stack.innerHTML = html;
    }

    function renderMatchRow(m) {
      const best = getBestPrediction(m);
      const signal = getSignalLabel(best);
      const isExpanded = expandedMatchId === m.id;
      let html = '<tr class="match-row" onclick="toggleMatchDetail(\'' + m.id + '\')">';
      html += '<td data-label="时间"><div class="time-stack"><span class="kickoff-time">' + formatTimeTz(m.kickoffTime) + '</span>';
      if (m.matchNo) html += '<span class="status-note">' + m.matchNo + '</span>';
      if (m.kickoffDate) html += '<span class="status-note">' + m.kickoffDate + '</span>';
      html += '</div></td>';
      html += '<td data-label="主队"><div class="team-stack"><div class="team-line">' + getTeamBadgeHtml(m.homeTeamName, m.homeTeamLogo, m.homeTeamLogoType, m.homeTeamColor) + '<span class="team-name">' + escapeHtml(m.homeTeamName || '未知主队') + '</span></div></div></td>';
      html += '<td data-label="预测"><div class="prediction-cell">';
      if (best) {
        const cls = best.resultStatus === 'HIT' ? 'is-hit' : best.resultStatus === 'MISS' ? 'is-miss' : '';
        html += '<div class="' + cls + '"><span class="prediction-tip">' + (best.tipLabel?.zh || best.tipCode) + '</span>';
        if (best.trustScore) html += '<span class="prediction-odds">可信 ' + best.trustScore + '</span>';
        html += '</div>';
      } else { html += '<span class="prediction-tip" style="color:hsl(var(--text-muted))">—</span>'; }
      html += '</div></td>';
      html += '<td data-label="客队"><div class="team-stack"><div class="team-line">' + getTeamBadgeHtml(m.awayTeamName, m.awayTeamLogo, m.awayTeamLogoType, m.awayTeamColor) + '<span class="team-name">' + escapeHtml(m.awayTeamName || '未知客队') + '</span></div></div></td>';
      html += '<td data-label="胜平负"><div class="odds-stack">';
      if (m.odds) {
        const inSlip = betSlipItems.find(b => b.matchId === m.id);
        [
          { pick: '1', label: '主', odds: m.odds.odds1 },
          { pick: 'X', label: '平', odds: m.odds.oddsX },
          { pick: '2', label: '客', odds: m.odds.odds2 },
        ].forEach(opt => {
          const isActive = inSlip && inSlip.pick === opt.pick;
          html += '<div class="odds-row" style="cursor:pointer;' + (isActive ? 'background:hsl(var(--primary)/.15);border-radius:4px;padding:0 .25rem' : '') + '" onclick="event.stopPropagation();toggleBetItem(\'' + m.id + '\',\'' + opt.pick + '\',\'' + (opt.pick === '1' ? '主胜' : opt.pick === 'X' ? '平局' : '客胜') + '\',' + opt.odds + ',\'' + escapeJs(m.homeTeamName) + '\',\'' + escapeJs(m.awayTeamName) + '\',\'' + escapeJs(m.leagueName || '') + '\')">';
          html += '<span>' + opt.label + '</span><strong style="' + (isActive ? 'color:hsl(var(--primary))' : '') + '">' + opt.odds + '</strong></div>';
        });
      }
      html += '</div></td>';
      html += '<td data-label="让球"><div class="odds-stack">';
      if (m.handicapOdds) {
        html += '<div class="odds-row"><span>' + getHandicapDisplay(m.handicapLine || 0) + '</span></div>';
        html += '<div class="odds-row"><span>主</span><strong>' + m.handicapOdds.odds1 + '</strong></div>';
        html += '<div class="odds-row"><span>平</span><strong>' + m.handicapOdds.oddsX + '</strong></div>';
        html += '<div class="odds-row"><span>客</span><strong>' + m.handicapOdds.odds2 + '</strong></div>';
      }
      html += '</div></td>';
      html += '<td data-label="操作"><div class="match-signal-line"><span class="signal-badge ' + signal.cls + '">' + signal.text + '</span>';
      if (best?.riskTags?.length) html += '<span class="signal-risk-count">' + best.riskTags.length + ' 风险</span>';
      html += '</div><button class="details-button" onclick="event.stopPropagation();navigateTo(\'detail\',{matchId:\'' + m.id + '\'})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg> 详情</button></td>';
      html += '</tr>';
      if (isExpanded) {
        html += '<tr><td colspan="7" style="padding:0;border:none">' + renderMatchDetailInline(m) + '</td></tr>';
      }
      return html;
    }

    function toggleMatchDetail(matchId) {
      expandedMatchId = expandedMatchId === matchId ? null : matchId;
      renderLeagueStack();
    }

    function renderMatchDetailInline(m) {
      let html = '<div style="padding:1.25rem;background:hsl(var(--bg-card));border:1px solid hsl(var(--border));border-radius:var(--radius);margin:0.5rem 0">';
      if (m.predictions?.length) {
        m.predictions.forEach(pred => { html += renderPredictionCard(pred, m); });
      }
      if (m.probabilityModel) html += renderProbabilityModelCard(m.probabilityModel, m);
      if (m.stats) html += renderStatsCard(m.stats);
      if (m.oddsTrend) html += renderOddsTrendCard(m.oddsTrend);
      html += '<button class="btn btn-primary" style="margin-top:1rem" onclick="event.stopPropagation();navigateTo(\'detail\',{matchId:\'' + m.id + '\'})">查看完整分析 →</button>';
      html += '</div>';
      return html;
    }

    // ==================== SHARED COMPONENTS ====================
    function renderPredictionCard(pred, m) {
      const signal = getSignalLabel(pred);
      const isPremium = pred.visibilityStatus === 'PREMIUM';
      let html = '<div class="card" style="margin-bottom:1rem;' + (isPremium ? 'border-color:hsl(var(--premium)/.36);background:hsl(var(--premium-soft)/.5)' : '') + '">';
      html += '<div class="signal-summary-card"><div>';
      html += '<span class="badge ' + (signal.cls === 'is-steady' ? 'badge-success' : signal.cls === 'is-watch' ? 'badge-premium' : 'badge') + '">' + (pred.marketType || '') + ' · ' + signal.text + '</span>';
      html += '<h3>' + escapeHtml(pred.tipLabel?.zh || pred.tipCode) + '</h3>';
      if (pred.explanation?.zh) html += '<p>' + escapeHtml(pred.explanation.zh) + '</p>';
      if (pred.riskTags?.length) {
        html += '<div class="risk-tag-row">';
        pred.riskTags.forEach(tag => { html += '<span class="risk-tag">' + escapeHtml(tag.zh || tag) + '</span>'; });
        html += '</div>';
      }
      html += '</div><div class="signal-summary-meta">';
      if (pred.trustScore) {
        html += '<div class="trust-meter"><span class="trust-value" style="--trust-color:' + getTrustColor(pred.trustScore) + '">' + pred.trustScore + '</span><div class="trust-bar"><span style="--trust:' + pred.trustScore + '%;background:' + getTrustColor(pred.trustScore) + '"></span></div></div>';
      }
      if (isPremium) html += '<span class="badge badge-premium">🔒 会员</span>';
      html += '</div></div>';
      if (pred.analysisItems?.length) {
        html += '<div class="signal-summary-trend"><ul class="prediction-analysis-list">';
        pred.analysisItems.forEach(item => { html += '<li>' + escapeHtml(item.zh || item) + '</li>'; });
        html += '</ul></div>';
      }
      html += '</div>';
      return html;
    }

    function renderProbabilityModelCard(pm, m) {
      let html = '<div class="probability-model-card" style="margin-bottom:1rem">';
      html += '<div class="probability-model-head"><div><h3>概率模型</h3><p>' + escapeHtml(pm.basis?.zh || '') + '</p></div><span>' + (pm.version || '') + '</span></div>';
      html += '<div class="probability-model-grid">';
      if (pm.oneXTwo) {
        html += '<div class="probability-panel is-wide"><h4>胜平负概率</h4><div class="probability-triplet">';
        ['home','draw','away'].forEach(side => {
          const label = side === 'home' ? '主胜' : side === 'draw' ? '平局' : '客胜';
          const val = pm.oneXTwo.final?.[side];
          if (val !== undefined) html += '<div class="probability-outcome"><div><span>' + label + '</span><strong>' + val.toFixed(1) + '%</strong></div><em style="width:' + val + '%"></em></div>';
        });
        html += '</div>';
        if (pm.ensembleWeights) {
          html += '<div class="probability-subline"><span class="probability-weight-line">集成权重：</span>';
          Object.entries(pm.ensembleWeights).forEach(([k,v]) => { html += '<span>' + k + ' ' + (v*100).toFixed(0) + '%</span>'; });
          html += '</div>';
        }
        html += '</div>';
      }
      if (pm.goalLines) {
        html += '<div class="probability-panel"><h4>进球线</h4><div class="score-probability-list">';
        if (pm.goalLines.over25 !== undefined) html += '<span>大2.5球<strong>' + pm.goalLines.over25.toFixed(1) + '%</strong></span>';
        if (pm.goalLines.under25 !== undefined) html += '<span>小2.5球<strong>' + pm.goalLines.under25.toFixed(1) + '%</strong></span>';
        html += '</div></div>';
      }
      if (pm.bothTeamsToScore) {
        html += '<div class="probability-panel"><h4>双方进球</h4><div class="probability-pair-grid">';
        if (pm.bothTeamsToScore.yes !== undefined) html += '<span>是<strong>' + pm.bothTeamsToScore.yes.toFixed(1) + '%</strong></span>';
        if (pm.bothTeamsToScore.no !== undefined) html += '<span>否<strong>' + pm.bothTeamsToScore.no.toFixed(1) + '%</strong></span>';
        html += '</div></div>';
      }
      if (pm.scoreDistribution?.length) {
        html += '<div class="probability-panel"><h4>比分分布</h4><div class="score-probability-list">';
        pm.scoreDistribution.slice(0,8).forEach(s => {
          html += '<span>' + (s.home||0) + '-' + (s.away||0) + '<strong>' + (s.probability?.toFixed(1)||'') + '%</strong></span>';
        });
        html += '</div></div>';
      }
      if (m.handicapOdds) {
        html += '<div class="probability-panel"><h4>让球胜平负 (' + getHandicapDisplay(m.handicapLine||0) + ')</h4><div class="score-probability-list">';
        html += '<span>主胜<strong>' + m.handicapOdds.odds1 + '</strong></span><span>平局<strong>' + m.handicapOdds.oddsX + '</strong></span><span>客胜<strong>' + m.handicapOdds.odds2 + '</strong></span>';
        html += '</div></div>';
      }
      html += '</div></div>';
      return html;
    }

    function renderStatsCard(stats) {
      let html = '<div class="insight-card" style="margin-bottom:1rem"><div class="insight-head"><div><h3>赛前数据参考</h3><p>模型输出的攻防指标，仅供参考</p></div></div>';
      html += '<div class="insight-metric-grid">';
      const items = [
        ['xG 主', stats.xG?.home?.toFixed(2)], ['xG 客', stats.xG?.away?.toFixed(2)],
        ['控球率 主', stats.possession?.home ? stats.possession.home+'%' : null], ['控球率 客', stats.possession?.away ? stats.possession.away+'%' : null],
        ['射门 主', stats.shots?.home], ['射门 客', stats.shots?.away],
        ['射正 主', stats.shotsOnTarget?.home], ['射正 客', stats.shotsOnTarget?.away],
      ];
      items.forEach(([label, val]) => {
        html += '<div class="insight-metric"><span>' + label + '</span><strong>' + (val || '—') + '</strong></div>';
      });
      html += '</div></div>';
      return html;
    }

    function renderOddsTrendCard(trend) {
      let html = '<div class="sp-trend-box"><strong>SP 走势</strong>';
      if (trend.summary?.zh) html += '<p>' + escapeHtml(trend.summary.zh) + '</p>';
      html += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.3rem">';
      if (trend.sampleSize) html += '<span>快照 ' + trend.sampleSize + ' 次</span>';
      if (trend.direction) html += '<span>方向: ' + trend.direction + '</span>';
      html += '</div></div>';
      return html;
    }

    // ==================== PAGE: DETAIL (比赛详情) ====================
    function renderDetailPage() {
      // 从当前赛事或历史赛事中查找
      const m = matchesData.find(x => x.id === detailMatchId) || historyData.find(x => x.id === detailMatchId);
      if (!m) return '<div class="empty-state"><p>比赛不存在</p><button class="btn btn-primary" onclick="navigateTo(\'home\')">返回列表</button></div>';

      const isFinished = m.status === 'FINISHED';
      const hasScore = m.scoreHome !== undefined && m.scoreHome !== null;
      const best = getBestPrediction(m);
      let html = '';

      // Back button - 返回到来源页面
      const backPage = isFinished ? 'history' : 'home';
      html += '<button class="btn btn-secondary" style="margin-bottom:1rem" onclick="navigateTo(\'' + backPage + '\')">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> 返回列表</button>';

      // Match header card
      html += '<div class="card" style="margin-bottom:1.25rem">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">';
      html += '<div><span class="badge">' + escapeHtml(m.leagueName || '未知赛事') + '</span>';
      if (m.matchNo) html += ' <span class="badge">' + m.matchNo + '</span>';
      if (isFinished) html += ' <span class="badge badge-success">已完场</span>';
      html += '</div>';
      html += '<span style="color:hsl(var(--text-muted));font-size:.82rem">' + formatTimeTz(m.kickoffTime) + ' ' + (m.kickoffDate || formatDateCN(m.kickoffTime)) + ' (' + getTimezone().label + ')</span>';
      html += '</div>';

      // Teams & Score
      html += '<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;margin:1.5rem 0">';
      html += '<div style="text-align:center">' + getTeamBadgeHtml(m.homeTeamName, m.homeTeamLogo, m.homeTeamLogoType, m.homeTeamColor).replace('width:30px', 'width:64px;height:64px;font-size:1.7rem') + '<div class="team-name" style="margin-top:.5rem;font-size:1.1rem">' + escapeHtml(m.homeTeamName || '未知') + '</div></div>';

      if (isFinished && hasScore) {
        // 已完场: 显示最终比分
        const homeWin = m.scoreHome > m.scoreAway;
        const draw = m.scoreHome === m.scoreAway;
        const scoreColor = homeWin ? 'var(--primary)' : draw ? 'var(--text-muted)' : 'var(--danger)';
        html += '<div style="text-align:center">';
        html += '<div style="font-size:2.5rem;font-weight:950;font-family:var(--font-title);color:' + scoreColor + '">' + m.scoreHome + ' - ' + m.scoreAway + '</div>';
        html += '<div style="color:hsl(var(--text-muted));font-size:.78rem;margin-top:.25rem">全场比分</div>';
        html += '</div>';
      } else {
        // 未开始: 显示 VS
        html += '<div style="text-align:center"><span style="font-size:1.5rem;font-weight:900;color:hsl(var(--text-muted))">VS</span></div>';
      }

      html += '<div style="text-align:center">' + getTeamBadgeHtml(m.awayTeamName, m.awayTeamLogo, m.awayTeamLogoType, m.awayTeamColor).replace('width:30px', 'width:64px;height:64px;font-size:1.7rem') + '<div class="team-name" style="margin-top:.5rem;font-size:1.1rem">' + escapeHtml(m.awayTeamName || '未知') + '</div></div>';
      html += '</div>';

      // 已完场: 显示预测命中结果
      if (isFinished && hasScore && best) {
        const actualResult = m.scoreHome > m.scoreAway ? '1' : m.scoreHome === m.scoreAway ? 'X' : '2';
        const isHit = best.tipCode === actualResult;
        const resultCls = isHit ? 'badge-success' : 'badge';
        const resultText = isHit ? '✅ 预测命中' : '❌ 预测未中';
        html += '<div style="text-align:center;margin-bottom:1rem">';
        html += '<span class="badge ' + resultCls + '" style="font-size:.86rem;padding:.35rem .75rem">' + resultText + '</span>';
        html += '<div style="color:hsl(var(--text-muted));font-size:.78rem;margin-top:.35rem">推荐: ' + escapeHtml(best.tipLabel?.zh || best.tipCode) + ' (可信 ' + best.trustScore + ')</div>';
        html += '</div>';
      }

      // Odds row (未完场才显示赔率)
      if (!isFinished && m.odds) {
        html += '<div style="display:flex;justify-content:center;gap:1.5rem;margin-bottom:1rem">';
        html += '<div class="odds-stack" style="align-items:center"><span style="font-size:.76rem">主胜</span><strong style="font-size:1.1rem">' + m.odds.odds1 + '</strong></div>';
        html += '<div class="odds-stack" style="align-items:center"><span style="font-size:.76rem">平局</span><strong style="font-size:1.1rem">' + m.odds.oddsX + '</strong></div>';
        html += '<div class="odds-stack" style="align-items:center"><span style="font-size:.76rem">客胜</span><strong style="font-size:1.1rem">' + m.odds.odds2 + '</strong></div>';
        if (m.handicapOdds) {
          html += '<div style="border-left:1px solid hsl(var(--border));padding-left:1.5rem;display:flex;gap:1.5rem">';
          html += '<div class="odds-stack" style="align-items:center"><span style="font-size:.76rem">让球 ' + getHandicapDisplay(m.handicapLine||0) + '</span></div>';
          html += '<div class="odds-stack" style="align-items:center"><span style="font-size:.76rem">主</span><strong style="font-size:1.1rem">' + m.handicapOdds.odds1 + '</strong></div>';
          html += '<div class="odds-stack" style="align-items:center"><span style="font-size:.76rem">平</span><strong style="font-size:1.1rem">' + m.handicapOdds.oddsX + '</strong></div>';
          html += '<div class="odds-stack" style="align-items:center"><span style="font-size:.76rem">客</span><strong style="font-size:1.1rem">' + m.handicapOdds.odds2 + '</strong></div>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';

      // Tabs - 已完场和未开始显示不同标签
      html += '<div class="tabs-container" id="detailTabs">';
      const tabs = isFinished
        ? [
            { id: 'result', label: '赛果复盘' },
            { id: 'stats', label: '数据统计' },
            { id: 'history', label: '近期战绩' },
            { id: 'h2h', label: '交锋历史' },
          ]
        : [
            { id: 'predictions', label: '预测推荐' },
            { id: 'probability', label: '概率预测系统' },
            { id: 'stats', label: '数据统计' },
            { id: 'history', label: '近期战绩' },
            { id: 'h2h', label: '交锋历史' },
          ];
      tabs.forEach((tab, i) => {
        html += '<button class="tab-btn ' + (i === 0 ? 'active' : '') + '" onclick="switchDetailTab(\'' + tab.id + '\',this)">' + tab.label + '</button>';
      });
      html += '</div>';

      // Tab content
      html += '<div id="detailTabContent">';
      const defaultTab = isFinished ? 'result' : 'predictions';
      html += renderDetailTabContent(defaultTab, m);
      html += '</div>';

      return html;
    }

    function switchDetailTab(tabId, btn) {
      document.querySelectorAll('#detailTabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const m = matchesData.find(x => x.id === detailMatchId) || historyData.find(x => x.id === detailMatchId);
      if (m) document.getElementById('detailTabContent').innerHTML = renderDetailTabContent(tabId, m);
    }

    function renderDetailTabContent(tabId, m) {
      switch (tabId) {
        case 'result': return renderDetailResult(m);
        case 'predictions': return renderDetailPredictions(m);
        case 'probability': return renderDetailProbability(m);
        case 'stats': return renderDetailStats(m);
        case 'history': return renderDetailHistory(m);
        case 'h2h': return renderDetailH2H(m);
        default: return '';
      }
    }

    function renderDetailResult(m) {
      const hasScore = m.scoreHome !== undefined && m.scoreHome !== null;
      const best = getBestPrediction(m);
      let html = '';

      // 最终比分
      if (hasScore) {
        const homeWin = m.scoreHome > m.scoreAway;
        const draw = m.scoreHome === m.scoreAway;
        html += '<div class="card" style="margin-bottom:1rem;text-align:center">';
        html += '<h4 style="margin-bottom:.75rem">全场比分</h4>';
        html += '<div style="font-size:3rem;font-weight:950;font-family:var(--font-title);color:' + (homeWin ? 'var(--primary)' : draw ? 'var(--text-muted)' : 'var(--danger)') + '">' + m.scoreHome + ' - ' + m.scoreAway + '</div>';
        html += '<div style="color:hsl(var(--text-secondary));margin-top:.5rem">' + escapeHtml(m.homeTeamName) + ' vs ' + escapeHtml(m.awayTeamName) + '</div>';
        html += '</div>';
      }

      // 赛前预测复盘
      if (best && hasScore) {
        const actualResult = m.scoreHome > m.scoreAway ? '1' : m.scoreHome === m.scoreAway ? 'X' : '2';
        const isHit = best.tipCode === actualResult;

        html += '<div class="card" style="margin-bottom:1rem;border-color:' + (isHit ? 'hsl(var(--success)/.36)' : 'hsl(var(--danger)/.36)') + '">';
        html += '<div class="signal-summary-card"><div>';
        html += '<span class="badge ' + (isHit ? 'badge-success' : 'badge') + '">' + (isHit ? '✅ 命中' : '❌ 未中') + '</span>';
        html += '<h3>赛前预测: ' + escapeHtml(best.tipLabel?.zh || best.tipCode) + '</h3>';
        if (best.explanation?.zh) html += '<p>' + escapeHtml(best.explanation.zh) + '</p>';
        html += '</div><div class="signal-summary-meta">';
        if (best.trustScore) {
          html += '<div class="trust-meter"><span class="trust-value" style="--trust-color:' + getTrustColor(best.trustScore) + '">' + best.trustScore + '</span><div class="trust-bar"><span style="--trust:' + best.trustScore + '%;background:' + getTrustColor(best.trustScore) + '"></span></div></div>';
        }
        html += '</div></div>';
        html += '</div>';
      }

      // 所有预测复盘
      if (m.predictions?.length && hasScore) {
        const actualResult = m.scoreHome > m.scoreAway ? '1' : m.scoreHome === m.scoreAway ? 'X' : '2';
        html += '<div class="card" style="margin-bottom:1rem">';
        html += '<h4 style="margin-bottom:.75rem">已结算推荐</h4>';
        m.predictions.forEach(pred => {
          const signal = getSignalLabel(pred);
          let hitStatus = '';
          if (pred.marketType === '1X2') {
            hitStatus = pred.tipCode === actualResult ? '命中' : pred.tipCode === 'WATCH' ? '观察' : '未中';
          }
          html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid hsl(var(--border))">';
          html += '<div><span class="badge ' + (signal.cls === 'is-steady' ? 'badge-success' : signal.cls === 'is-watch' ? 'badge-premium' : 'badge') + '">' + pred.marketType + '</span> ';
          html += '<span style="font-size:.86rem">' + escapeHtml(pred.tipLabel?.zh || pred.tipCode) + '</span></div>';
          html += '<div style="display:flex;align-items:center;gap:.5rem">';
          if (pred.trustScore) html += '<span style="color:hsl(var(--text-muted));font-size:.78rem">可信 ' + pred.trustScore + '</span>';
          if (hitStatus) html += '<span class="badge ' + (hitStatus === '命中' ? 'badge-success' : hitStatus === '观察' ? 'badge-premium' : 'badge') + '">' + hitStatus + '</span>';
          html += '</div></div>';
        });
        html += '</div>';
      }

      // 赛前概率分布
      if (m.probabilityModel) {
        html += '<div class="card" style="margin-bottom:1rem">';
        html += '<h4 style="margin-bottom:.5rem">赛前概率分布</h4>';
        html += '<div style="color:hsl(var(--text-muted));font-size:.78rem;margin-bottom:.5rem">基于赛前官方 SP 快照生成的推荐已按最终比分自动结算。</div>';
        if (m.probabilityModel.oneXTwo?.final) {
          const f = m.probabilityModel.oneXTwo.final;
          html += '<div class="score-probability-list">';
          html += '<span>主胜<strong>' + f.home.toFixed(1) + '%</strong></span>';
          html += '<span>平局<strong>' + f.draw.toFixed(1) + '%</strong></span>';
          html += '<span>客胜<strong>' + f.away.toFixed(1) + '%</strong></span>';
          html += '</div>';
        }
        html += '</div>';
      }

      // 赔率快照
      if (m.odds) {
        html += '<div class="card" style="margin-bottom:1rem">';
        html += '<h4 style="margin-bottom:.5rem">赛前快照</h4>';
        html += '<div class="score-probability-list">';
        html += '<span>主胜<strong>' + m.odds.odds1 + '</strong></span>';
        html += '<span>平局<strong>' + m.odds.oddsX + '</strong></span>';
        html += '<span>客胜<strong>' + m.odds.odds2 + '</strong></span>';
        html += '</div>';
        if (m.handicapOdds) {
          html += '<div style="margin-top:.5rem"><span style="color:hsl(var(--text-muted));font-size:.78rem">让球 ' + getHandicapDisplay(m.handicapLine || 0) + '</span></div>';
          html += '<div class="score-probability-list">';
          html += '<span>主<strong>' + m.handicapOdds.odds1 + '</strong></span>';
          html += '<span>平<strong>' + m.handicapOdds.oddsX + '</strong></span>';
          html += '<span>客<strong>' + m.handicapOdds.odds2 + '</strong></span>';
          html += '</div>';
        }
        html += '</div>';
      }

      if (!html) {
        html = '<div class="empty-state"><p>本场已完场，当前只保留赛果、历史复盘与已生成的赛前预测记录。</p></div>';
      }
      return html;
    }

    function renderDetailPredictions(m) {
      let html = '';
      if (!m.predictions?.length) {
        html += '<div class="empty-state"><p>当前暂无可用精选或观察结论。请稍后再试。</p></div>';
        return html;
      }
      m.predictions.forEach(pred => {
        const signal = getSignalLabel(pred);
        const isPremium = pred.visibilityStatus === 'PREMIUM';
        html += '<div class="card" style="margin-bottom:1rem;' + (isPremium ? 'border-color:hsl(var(--premium)/.36);background:hsl(var(--premium-soft)/.5)' : '') + '">';
        html += '<div class="signal-summary-card"><div>';
        html += '<span class="badge ' + (signal.cls === 'is-steady' ? 'badge-success' : signal.cls === 'is-watch' ? 'badge-premium' : 'badge') + '">' + (pred.marketType || '') + ' · ' + signal.text + '</span>';
        html += '<h3>' + escapeHtml(pred.tipLabel?.zh || pred.tipCode) + '</h3>';
        if (pred.explanation?.zh) html += '<p>' + escapeHtml(pred.explanation.zh) + '</p>';
        if (pred.riskTags?.length) {
          html += '<div class="risk-tag-row">';
          pred.riskTags.forEach(tag => { html += '<span class="risk-tag">' + escapeHtml(tag.zh || tag) + '</span>'; });
          html += '</div>';
        }
        html += '</div><div class="signal-summary-meta">';
        if (pred.trustScore) {
          html += '<div class="trust-meter"><span class="trust-value" style="--trust-color:' + getTrustColor(pred.trustScore) + '">' + pred.trustScore + '</span><div class="trust-bar"><span style="--trust:' + pred.trustScore + '%;background:' + getTrustColor(pred.trustScore) + '"></span></div></div>';
        }
        if (isPremium) html += '<span class="badge badge-premium">🔒 会员</span>';
        html += '</div></div>';
        if (pred.analysisItems?.length) {
          html += '<div class="signal-summary-trend"><ul class="prediction-analysis-list">';
          pred.analysisItems.forEach(item => { html += '<li>' + escapeHtml(item.zh || item) + '</li>'; });
          html += '</ul></div>';
        }
        html += '</div>';
      });

      // Professional framework
      html += renderProfessionalFramework(m);
      return html;
    }

    function renderProfessionalFramework(m) {
      let html = '<div class="professional-framework-card" style="margin-top:1rem">';
      html += '<div class="professional-framework-head"><div><h3>专业分析框架</h3><p>12 项赛前分析框架，每项只使用已接入的官方赛程、让球、快照与历史赛果；缺失数据会直接标记不足。</p></div><span>12 项</span></div>';
      html += '<div class="professional-framework-grid">';

      const items = [
        { title: '一、比赛基本面', text: '排名、积分、净胜球和阶段目标暂未接入，因此不把这些当作结论依据。' },
        { title: '二、近期状态', text: '近一年官方历史样本用于辅助，不替代实时阵容和过程数据。' },
        { title: '三、主客场表现', text: '当前只从近一年已完场官方结果追溯球队样本，未接入完整主客场积分榜。' },
        { title: '四、进攻能力', text: '用官方 SP 反推进攻热区和总进球倾向；射门、射正等过程数据不足。' },
        { title: '五、防守能力', text: '防守稳定性只参考官方赛果、比分和风险标签；被射门等暂未接入。' },
        { title: '六、伤停与首发', text: '该项数据不足：当前未接入可验证的官方伤停、预计首发。' },
        { title: '七、战术克制', text: '阵型、高压、反击等暂未接入可验证来源，本场不编造战术细节。' },
        { title: '八、赛程体能与战意', text: '休息天数、连续客场、杯赛轮换等暂未接入。' },

    // ==================== 时区设置 ====================
    const TIMEZONES = [
      { id: 'Asia/Shanghai', label: '北京时间', offset: 8, flag: '🇨🇳' },
      { id: 'Asia/Tokyo', label: '东京时间', offset: 9, flag: '🇯🇵' },
      { id: 'Europe/London', label: '伦敦时间', offset: 0, flag: '🇬🇧' },
      { id: 'Europe/Berlin', label: '柏林时间', offset: 1, flag: '🇩🇪' },
      { id: 'America/New_York', label: '纽约时间', offset: -5, flag: '🇺🇸' },
      { id: 'America/Los_Angeles', label: '洛杉矶时间', offset: -8, flag: '🇺🇸' },
    ];
    let currentTimezone = localStorage.getItem('fp_timezone') || 'Asia/Shanghai';

    function getTimezone() {
      return TIMEZONES.find(tz => tz.id === currentTimezone) || TIMEZONES[0];
    }

    function setTimezone(tzId) {
      currentTimezone = tzId;
      localStorage.setItem('fp_timezone', tzId);
      renderPage();
      updateBetslipPanel();
    }

    // 格式化时间 (带时区转换)
    function formatTimeTz(isoStr) {
      if (!isoStr) return '--:--';
      const d = new Date(isoStr);
      const tz = getTimezone();
      // 获取 UTC 时间，然后加上时区偏移
      const utc = d.getTime() + d.getTimezoneOffset() * 60000;
      const local = new Date(utc + tz.offset * 3600000);
      return String(local.getHours()).padStart(2, '0') + ':' + String(local.getMinutes()).padStart(2, '0');
    }

    function formatDateTz(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const tz = getTimezone();
      const utc = d.getTime() + d.getTimezoneOffset() * 60000;
      const local = new Date(utc + tz.offset * 3600000);
      return (local.getMonth() + 1) + '/' + local.getDate();
    }

    function formatDateTimeTz(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const tz = getTimezone();
      const utc = d.getTime() + d.getTimezoneOffset() * 60000;
      const local = new Date(utc + tz.offset * 3600000);
      const mm = String(local.getMonth() + 1).padStart(2, '0');
      const dd = String(local.getDate()).padStart(2, '0');
      const hh = String(local.getHours()).padStart(2, '0');
      const mi = String(local.getMinutes()).padStart(2, '0');
      return mm + '/' + dd + ' ' + hh + ':' + mi;
    }

    // 添加/移除投注项
    function toggleBetItem(matchId, pick, pickLabel, odds, homeTeam, awayTeam, league) {
      const idx = betSlipItems.findIndex(b => b.matchId === matchId);
      if (idx >= 0) {
        if (betSlipItems[idx].pick === pick) {
          betSlipItems.splice(idx, 1); // 取消
        } else {
          betSlipItems[idx] = { matchId, homeTeam, awayTeam, league, pick, pickLabel, odds };
        }
      } else {
        betSlipItems.push({ matchId, homeTeam, awayTeam, league, pick, pickLabel, odds });
      }
      updateBetslipPanel();
    }

    function removeBetItem(matchId) {
      betSlipItems = betSlipItems.filter(b => b.matchId !== matchId);
      updateBetslipPanel();
      if (currentPage === 'betslip') renderPage();
    }

    function clearBetSlip() {
      betSlipItems = [];
      updateBetslipPanel();
      if (currentPage === 'betslip') renderPage();
    }

    function setBetSlipMode(mode) {
      betSlipMode = mode;
      if (currentPage === 'betslip') renderPage();
      updateBetslipPanel();
    }

    // 计算当前选择的总赔率
    function calcCurrentOdds() {
      if (betSlipItems.length === 0) return 0;
      return betSlipMode === 'parlay'
        ? betSlipItems.reduce((acc, b) => acc * (b.odds || 1), 1)
        : betSlipItems.reduce((acc, b) => acc + (b.odds || 1), 0);
    }

    function updateBetslipPanel() {
      let panel = document.getElementById('betslipFloat');
      if (!panel) return;
      if (betSlipItems.length === 0) {
        panel.style.display = 'none';
        return;
      }
      panel.style.display = 'flex';
      const totalOdds = calcCurrentOdds();
      const potentialWin = betSlipMode === 'parlay'
        ? (betSlipStake * totalOdds).toFixed(2)
        : betSlipItems.reduce((acc, b) => acc + betSlipStake * (b.odds || 1), 0).toFixed(2);

      panel.innerHTML =
        '<div style="display:flex;align-items:center;gap:.75rem">' +
          '<span class="badge badge-success">' + betSlipItems.length + ' 场</span>' +
          '<span style="font-size:.82rem">' + (betSlipMode === 'parlay' ? '串关' : '单关') + '</span>' +
        '</div>' +
        '<button class="btn btn-primary" style="padding:.45rem 1rem" onclick="navigateTo(\'betslip\')">查看 · 预计 ' + potentialWin + '</button>';
    }

        html += '<div style="display:flex;gap:.5rem">';

        html += '<button class="btn btn-primary" style="flex:2" onclick="submitBetslip()">确认下注</button>';

      // ========== 我的注单 (已提交) ==========
      if (user) {

          const key = m.leagueName || '未知赛事';
          if (!groups[key]) groups[key] = [];
          groups[key].push(m);

        Object.entries(groups).forEach(([league, matches]) => {
          html += '<div class="league-card" style="margin-bottom:1rem">';

            html += '<div style="display:flex;align-items:center;gap:.3rem;justify-content:flex-end">' + getTeamBadgeHtml(m.awayTeamName, m.awayTeamLogo, m.awayTeamLogoType, m.awayTeamColor) + '<span style="font-size:.82rem;font-weight:700">' + escapeHtml(m.awayTeamName) + '</span></div>';

              const isActive = inSlip && inSlip.pick === opt.pick;
              html += '<button class="btn ' + (isActive ? 'btn-primary' : 'btn-secondary') + '" style="padding:.3rem;font-size:.76rem;flex-direction:column;gap:0" onclick="toggleBetItem(\'' + m.id + '\',\'' + opt.pick + '\',\'' + opt.label + '\',' + opt.odds + ',\'' + escapeJs(m.homeTeamName) + '\',\'' + escapeJs(m.awayTeamName) + '\',\'' + escapeJs(m.leagueName || '') + '\');updateBetslipPanel()">';
              html += '<span>' + opt.label + '</span><strong>' + opt.odds + '</strong></button>';
            });
            html += '</div></div>';
          });
          html += '</div>';
        });
      }
      html += '</div>';
      return html;
    }

    function submitBetslip() {
      if (betSlipItems.length === 0) return;

      const user = getCurrentUser();
      if (!user) {
        showAuthModal('login');
        return;
      }

      const totalOdds = calcCurrentOdds();
      const totalStake = betSlipMode === 'parlay' ? betSlipStake : betSlipStake * betSlipItems.length;

      const userData = getUserData(user);
      userData.betslips.push({
        id: 'slip_' + Date.now(),
        createdAt: new Date().toLocaleString('zh-CN'),
        mode: betSlipMode,
        stake: betSlipStake,
        totalOdds: totalOdds,
        totalStake: totalStake,
        picks: betSlipItems.map(b => ({ ...b })),
        settled: false,
        results: [],
      });
      saveUserData(user, userData);

      // 清空购物车，可以继续下注
      betSlipItems = [];
      updateBetslipPanel();
      renderPage();
    }

      return html;

    function selectChallenge(matchId, code) {
      challengeSelections[matchId] = code;
      renderPage();
    }

    function resetChallenge() {
      challengeSelections = {};
      renderPage();
    }

    function submitChallenge() {
      const user = getCurrentUser();
      if (!user) {
        showAuthModal('login');
        return;
      }
      const scheduled = matchesData.filter(m => m.status === 'SCHEDULED').slice(0, 5);
      const allSelected = scheduled.every(m => challengeSelections[m.id]);
      if (!allSelected) {
        alert('请在提交前完成全部 ' + scheduled.length + ' 场比赛的预测选择！');
        return;
      }

      // 保存到用户数据
      const todayKey = getTodayKey();
      const userData = getUserData(user);
      // 检查今天是否已提交
      const existing = userData.challenges.find(c => c.date === todayKey);
      if (existing) {
        alert('您今日已提交过竞猜，不可重复提交。');
        return;
      }

      const entry = {
        date: todayKey,
        submittedAt: new Date().toISOString(),
        selections: scheduled.map(m => ({
          matchId: m.id,
          homeTeam: m.homeTeamName,
          awayTeam: m.awayTeamName,
          league: m.leagueName,
          kickoffTime: m.kickoffTime,
          pick: challengeSelections[m.id],
          pickLabel: challengeSelections[m.id] === '1' ? '主胜' : challengeSelections[m.id] === 'X' ? '平局' : '客胜',
          result: null, // 赛后更新
          isHit: null,
        })),
        settled: false,
        hitCount: 0,
        totalMatches: scheduled.length,
      };

      userData.challenges.push(entry);
      saveUserData(user, userData);
      challengeSelections = {};
      alert('您已提交今日的命中赢奖竞猜！请关注赛后结算。');
      navigateTo('mine');
    }

            html += '</div>';
            html += '<div style="display:flex;align-items:center;gap:.5rem;flex:none">';
            html += '<span style="font-weight:800">' + escapeHtml(sel.pickLabel) + '</span>';
            if (hasResult) {
              html += '<span class="badge ' + (sel.isHit ? 'badge-success' : 'badge') + '">' + (sel.isHit ? '✅' : '❌') + '</span>';
              html += '<span style="color:hsl(var(--text-muted));font-size:.78rem">' + sel.result + '</span>';
            }
            html += '</div></div>';
          });

      html += '</div>';

      // 投注单记录
      html += '<div class="card">';
      html += '<h3 style="margin-bottom:1rem">投注单记录</h3>';

        html += '<div class="empty-state" style="min-height:120px"><p>暂无投注单记录，去投注单页面选择比赛吧</p></div>';
      } else {

        sorted.forEach(slip => {
          const mode = slip.mode === 'parlay' ? '串关' : '单关';
          html += '<div style="border:1px solid hsl(var(--border));border-radius:var(--radius);padding:1rem;margin-bottom:.75rem">';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">';
          html += '<div><span style="color:hsl(var(--text-muted));font-size:.78rem">' + slip.createdAt + '</span> ';
          html += '<span class="badge">' + mode + '</span></div>';
          html += '<div style="text-align:right"><div style="font-size:.72rem;color:hsl(var(--text-muted))">赔率</div>';
          html += '<strong style="color:hsl(var(--premium))">' + (slip.totalOdds || 0).toFixed(2) + 'x</strong></div>';
          html += '</div>';
          slip.picks.forEach(p => {
            html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:.82rem;padding:.3rem 0;border-bottom:1px solid hsl(var(--border))">';
            html += '<span>' + escapeHtml(p.homeTeam || '') + ' vs ' + escapeHtml(p.awayTeam || '') + '</span>';
            html += '<span style="display:flex;align-items:center;gap:.35rem"><span class="badge badge-success" style="font-size:.72rem">' + escapeHtml(p.pickLabel || p.pick || '') + '</span><strong>' + (p.odds || '—') + '</strong></span>';
            html += '</div>';
          });
          if (slip.stake) {
            html += '<div style="margin-top:.5rem;font-size:.78rem;color:hsl(var(--text-muted))">本金: ' + (slip.totalStake || slip.stake) + ' · 预计收益: ' + ((slip.stake || 0) * (slip.totalOdds || 1)).toFixed(2) + '</div>';
          }
          html += '</div>';
        });
      }
      html += '</div>';

      return html;
    }

    // ==================== PAGE: WORLDCUP (世界杯) ====================
    function renderWorldCupPage() {
      if (!worldcupData) {
        return '<div class="empty-state"><p>世界杯数据加载中...</p></div>';
      }

      const evt = worldcupData.event || {};
      const groups = worldcupData.groups || [];
      const contenders = worldcupData.contenders || [];
      const knockoutStages = worldcupData.knockoutStages || [];

      let html = '';

      // Refresh button
      html += '<div style="display:flex;justify-content:flex-end;margin-bottom:.5rem">' + refreshBtnHtml(false) + '</div>';

      // Hero panel
      html += '<div class="worldcup-hero-panel">';
      html += '<div class="worldcup-hero-copy">';
      html += '<div class="worldcup-kicker"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg> 世界杯专栏</div>';
      html += '<h1>' + escapeHtml(evt.name || '世界杯') + '</h1>';
      html += '<p>世界杯小组赛与淘汰赛预测已接入。先展示 A~L 组基准预测、32 强路径和争冠层级；世界杯竞彩 SP 上线后，单场模型会自动滚动修正。</p>';
      html += '<div class="worldcup-hero-meta">';
      if (evt.hosts) html += '<span>举办地：' + evt.hosts.join('·') + '</span>';
      if (evt.teams) html += '<span>参赛队 ' + evt.teams + ' 支</span>';
      if (evt.totalMatches) html += '<span>总场次 ' + evt.totalMatches + ' 场</span>';
      html += '</div></div>';
      html += '<div class="worldcup-countdown-card"><span>距开赛</span><strong>' + (evt.startDate || '—') + '</strong><span>' + (evt.startDate || '') + '</span></div>';
      html += '</div>';

      // KPI grid
      html += '<div class="worldcup-kpi-grid">';
      [
        { icon: '📊', label: '小组赛预测', value: '' + groups.length, unit: '组' },
        { icon: '🏆', label: '淘汰赛路径', value: '' + knockoutStages.length, unit: '轮' },
        { icon: '🎯', label: '冠军候选观察', value: '' + contenders.length, unit: '队' },
        { icon: '📈', label: '数据更新', value: worldcupData.updatedAt ? formatRelativeTime(worldcupData.updatedAt) : '—', unit: '' },
      ].forEach(kpi => {
        html += '<article><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>';
        html += '<span>' + kpi.label + '</span><strong>' + kpi.value + kpi.unit + '</strong></article>';
      });
      html += '</div>';

      // 计算小组实际战绩
      const allMatches = [...matchesData, ...historyData];
      function getGroupResults(group) {
        const teamNames = group.teams.map(t => t.name);
        const results = {};
        teamNames.forEach(name => {
          results[name] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, points: 0, recentMatches: [] };
        });

        // 找出该小组队伍之间的所有已完场比赛
        const groupMatches = allMatches.filter(m =>
          m.status === 'FINISHED' &&
          teamNames.includes(m.homeTeamName) &&
          teamNames.includes(m.awayTeamName) &&
          m.scoreHome !== null && m.scoreHome !== undefined
        );

        groupMatches.forEach(m => {
          const home = results[m.homeTeamName];
          const away = results[m.awayTeamName];
          if (!home || !away) return;

          home.played++; away.played++;
          home.gf += m.scoreHome; home.ga += m.scoreAway;
          away.gf += m.scoreAway; away.ga += m.scoreHome;

          if (m.scoreHome > m.scoreAway) {
            home.won++; home.points += 3;
            away.lost++;
          } else if (m.scoreHome < m.scoreAway) {
            away.won++; away.points += 3;
            home.lost++;
          } else {
            home.drawn++; home.points += 1;
            away.drawn++; away.points += 1;
          }

          home.recentMatches.push({ opponent: m.awayTeamName, score: m.scoreHome + '-' + m.scoreAway, isHome: true, won: m.scoreHome > m.scoreAway, draw: m.scoreHome === m.scoreAway });
          away.recentMatches.push({ opponent: m.homeTeamName, score: m.scoreAway + '-' + m.scoreHome, isHome: false, won: m.scoreAway > m.scoreHome, draw: m.scoreHome === m.scoreAway });
        });

        // 按积分排序
        const sorted = teamNames.map(name => ({ name, ...results[name] }))
          .sort((a, b) => b.points - a.points || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf);

        return { sorted, totalMatches: groupMatches.length };
      }

      // Groups
      html += '<div class="worldcup-section" style="margin-top:1rem">';
      html += '<div class="worldcup-section-head"><div><h3>小组赛预测</h3><p>' + groups.length + ' 个小组，每组前二直接出线 + 8 个最佳第三进入 32 强淘汰赛。</p></div></div>';
      html += '<div class="worldcup-group-grid">';
      groups.forEach(group => {
        const { sorted, totalMatches } = getGroupResults(group);
        const hasResults = totalMatches > 0;

        html += '<div class="worldcup-group-card">';
        html += '<header><span>' + escapeHtml(group.name) + '</span>';
        html += '<strong>' + (hasResults ? totalMatches + ' 场已赛' : group.teams.length + ' 队') + '</strong></header>';
        html += '<p>' + escapeHtml(group.description) + '</p>';

        // 如果有实际比赛结果，显示积分榜
        if (hasResults) {
          html += '<div style="margin-bottom:.5rem">';
          html += '<div style="display:grid;grid-template-columns:1fr repeat(5,auto);gap:.25rem;font-size:.72rem;color:hsl(var(--text-muted));padding:.25rem 0;border-bottom:1px solid hsl(var(--border))">';
          html += '<span></span><span style="text-align:center">场</span><span style="text-align:center">胜</span><span style="text-align:center">平</span><span style="text-align:center">负</span><span style="text-align:center;font-weight:800">积分</span>';
          html += '</div>';
          sorted.forEach((team, rank) => {
            const groupTeam = group.teams.find(t => t.name === team.name);
            const isQualified = rank < 2;
            html += '<div style="display:grid;grid-template-columns:1fr repeat(5,auto);gap:.25rem;padding:.35rem 0;border-bottom:1px solid hsl(var(--border));' + (isQualified ? 'background:hsl(var(--success)/.05)' : '') + '">';
            html += '<div style="display:flex;align-items:center;gap:.35rem">';
            html += '<span style="font-size:.72rem;color:hsl(var(--text-muted));width:1.2rem">' + (rank + 1) + '</span>';
            html += '<span class="worldcup-team-flag" style="background:' + (groupTeam?.color || '#333') + ';width:1.5rem;height:1.05rem;font-size:.48rem;border-radius:.2rem"><b>' + escapeHtml(groupTeam?.code || '') + '</b></span>';
            html += '<span style="font-size:.82rem;font-weight:800">' + escapeHtml(team.name) + '</span>';
            html += '</div>';
            html += '<span style="text-align:center;font-size:.82rem">' + team.played + '</span>';
            html += '<span style="text-align:center;font-size:.82rem;color:hsl(var(--success))">' + team.won + '</span>';
            html += '<span style="text-align:center;font-size:.82rem">' + team.drawn + '</span>';
            html += '<span style="text-align:center;font-size:.82rem;color:hsl(var(--danger))">' + team.lost + '</span>';
            html += '<span style="text-align:center;font-size:.86rem;font-weight:900;color:hsl(var(--primary))">' + team.points + '</span>';
            html += '</div>';
          });
          html += '</div>';
        }

        // 队伍列表 (预测出线概率)
        html += '<div class="worldcup-group-team-list">';
        group.teams.forEach(team => {
          const prob = team.advanceProbability || 50;
          // 查找该队实际积分
          const actual = sorted.find(s => s.name === team.name);
          const hasActual = actual && actual.played > 0;

          html += '<div class="worldcup-group-team-row">';
          html += '<span class="worldcup-team-flag" style="background:' + (team.color || '#333') + '"><b>' + escapeHtml(team.code) + '</b></span>';
          html += '<div class="worldcup-team-copy"><strong>' + escapeHtml(team.name) + '</strong>';
          if (hasActual) {
            html += '<small style="color:hsl(var(--primary))">积分 ' + actual.points + ' · ' + actual.won + '胜' + actual.drawn + '平' + actual.lost + '负</small>';
          } else {
            html += '<small>' + escapeHtml(team.note) + '</small>';
          }
          html += '</div>';
          html += '<div class="worldcup-team-prob">';
          if (hasActual) {
            html += '<b style="color:hsl(var(--primary))">' + actual.points + '分</b><small>实际积分</small>';
          } else {
            html += '<b>' + prob + '%</b><small>出线</small>';
          }
          html += '</div>';
          html += '</div>';
          html += '<div class="worldcup-team-meter"><span style="--advance:' + (hasActual ? Math.min(100, actual.points * 10) : prob) + '%"></span></div>';
        });
        html += '</div></div>';
      });
      html += '</div></div>';

      // Knockout stages - 从实际数据中读取淘汰赛结果
      const allWCMatches = [...matchesData, ...historyData];
      const wcTeamNames = groups.flatMap(g => g.teams.map(t => t.name));

      // 找出淘汰赛相关比赛 (世界杯队伍之间，且不是小组赛内部对阵)
      // 这里用联赛名+非小组内部来判断淘汰赛
      html += '<div class="worldcup-section" style="margin-top:1rem">';
      html += '<div class="worldcup-section-head"><div><h3>淘汰赛路径预测</h3><p>32 强路径先按小组基准预测生成，后续会随官方赛程、SP 快照、伤停与赛果自动滚动更新。</p></div></div>';
      html += '<div class="worldcup-stage-grid">';

      knockoutStages.forEach(stage => {
        // 检查该阶段是否有实际比赛数据
        const stageMatches = allWCMatches.filter(m =>
          m.leagueName && (
            m.leagueName.includes(stage.stage) ||
            (stage.stage === '32 强' && m.leagueName.includes('世界杯') && m.matchNo && m.matchNo.includes('32'))
          ) &&
          m.status === 'FINISHED'
        );

        const hasResults = stageMatches.length > 0;
        const statusText = hasResults ? stageMatches.length + ' 场已赛' : (stage.status || '待更新');

        html += '<div class="worldcup-stage-card">';
        html += '<span>' + escapeHtml(stage.stage) + '</span>';
        html += '<strong style="' + (hasResults ? 'color:hsl(var(--success))' : '') + '">' + statusText + '</strong>';
        html += '<p>' + escapeHtml(stage.description) + '</p>';

        // 如果有比赛结果，显示具体比分
        if (hasResults) {
          html += '<div style="margin-top:.5rem;display:grid;gap:.35rem">';
          stageMatches.slice(0, 4).forEach(m => {
            const homeWin = m.scoreHome > m.scoreAway;
            html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:.78rem;padding:.25rem 0;border-bottom:1px solid hsl(var(--border))">';
            html += '<span style="' + (homeWin ? 'color:hsl(var(--primary));font-weight:800' : '') + '">' + escapeHtml(m.homeTeamName) + '</span>';
            html += '<strong style="font-family:var(--font-title)">' + m.scoreHome + ' - ' + m.scoreAway + '</strong>';
            html += '<span style="' + (!homeWin ? 'color:hsl(var(--primary));font-weight:800' : '') + '">' + escapeHtml(m.awayTeamName) + '</span>';
            html += '</div>';
          });
          html += '</div>';
        }

        html += '</div>';
      });

      html += '</div></div>';

      // Contenders
      html += '<div class="worldcup-section" style="margin-top:1rem">';
      html += '<div class="worldcup-section-head"><div><h3>争冠路径池</h3><p>世界杯相关场次里市场支持、模型可信和走势更强的球队提出来跟踪。</p></div></div>';
      html += '<div class="worldcup-contender-list">';
      contenders.forEach(c => {
        html += '<div class="worldcup-contender-card">';
        html += '<div class="worldcup-contender-team"><span class="team-badge" style="--team-color:#333">' + escapeHtml(c.code || '').substring(0,2) + '</span><div><strong>' + escapeHtml(c.name) + '</strong><small>' + escapeHtml(c.note) + '</small></div></div>';
        html += '<div><div class="worldcup-scorebar"><span style="--score:' + (c.score || 0) + '%"></span></div></div>';
        html += '<div class="worldcup-contender-meta"><b>' + (c.score || 0) + '</b><small>争冠指数</small></div>';
        html += '</div>';
      });
      html += '</div></div>';

      // Current observation pool - 显示未开始和最近已完场的比赛
      html += '<div class="worldcup-section" style="margin-top:1rem">';
      html += '<div class="worldcup-section-head"><div><h3>当前推荐观察池</h3><p>优先展示中国竞彩网同步到的世界杯、世预赛、国际赛相关场次。</p></div></div>';

      const wcLeagueFilter = m => m.leagueName && (m.leagueName.includes('世界杯') || m.leagueName.includes('世预赛') || m.leagueName.includes('国际赛'));
      const scheduledWC = matchesData.filter(wcLeagueFilter);
      const finishedWC = historyData.filter(wcLeagueFilter).slice(0, 5);
      const observationMatches = [...scheduledWC, ...finishedWC].slice(0, 8);

      if (observationMatches.length) {
        html += '<div class="worldcup-pipeline-list">';
        observationMatches.forEach(m => {
          const isFinished = m.status === 'FINISHED';
          const hasScore = m.scoreHome !== null && m.scoreHome !== undefined;
          const best = getBestPrediction(m);
          const signal = getSignalLabel(best);

          html += '<article>';
          html += '<span>' + escapeHtml(m.leagueName || '') + ' · ' + formatTimeTz(m.kickoffTime);
          if (isFinished) html += ' · <span style="color:hsl(var(--success))">已完场</span>';
          html += '</span>';

          if (isFinished && hasScore) {
            html += '<strong>' + escapeHtml(m.homeTeamName) + ' ' + m.scoreHome + ' - ' + m.scoreAway + ' ' + escapeHtml(m.awayTeamName) + '</strong>';
          } else {
            html += '<strong>' + escapeHtml(m.homeTeamName) + ' vs ' + escapeHtml(m.awayTeamName) + '</strong>';
          }

          html += '<div style="margin-top:.35rem">';
          if (isFinished && hasScore && best) {
            const actualResult = m.scoreHome > m.scoreAway ? '1' : m.scoreHome === m.scoreAway ? 'X' : '2';
            const isHit = best.tipCode === actualResult;
            html += '<span class="badge ' + (isHit ? 'badge-success' : 'badge') + '">' + (isHit ? '✅ 命中' : '❌ 未中') + '</span>';
          } else if (!isFinished) {
            html += '<span class="signal-badge ' + signal.cls + '">' + signal.text + '</span>';
            if (best?.trustScore) html += ' <span style="color:hsl(var(--text-muted));font-size:.72rem">可信 ' + best.trustScore + '</span>';
          }
          html += '</div>';
          html += '</article>';
        });
        html += '</div>';
      } else {
        html += '<div class="worldcup-empty">当前暂无世界杯相关赛程，等待下一次官方数据同步。</div>';
      }
      html += '</div>';

      return html;
    }

    function showAuthModal(mode) {
      const isLogin = mode !== 'register';
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.id = 'authModal';
      backdrop.innerHTML = '<div class="modal-content">' +
        '<div class="tabs-container" style="margin-bottom:1.25rem">' +
          '<button class="tab-btn ' + (isLogin ? 'active' : '') + '" onclick="closeAuthModal();showAuthModal(\'login\')">登录</button>' +
          '<button class="tab-btn ' + (!isLogin ? 'active' : '') + '" onclick="closeAuthModal();showAuthModal(\'register\')">注册</button>' +
        '</div>' +
        '<div class="form-group"><label class="form-label">用户名</label><input class="form-input" id="authUsername" placeholder="请输入用户名" /></div>' +
        '<div class="form-group"><label class="form-label">密码</label><input class="form-input" id="authPassword" type="password" placeholder="请输入密码" /></div>' +
        '<p id="authError" style="color:hsl(var(--danger));font-size:.82rem;margin-bottom:1rem;display:none"></p>' +
        '<button class="btn btn-primary" style="width:100%" onclick="submitAuth(\'' + (isLogin ? 'login' : 'register') + '\')">' + (isLogin ? '登录' : '注册') + '</button>' +
        '<button class="btn btn-secondary" style="width:100%;margin-top:.5rem" onclick="closeAuthModal()">取消</button>' +
      '</div>';
      document.body.appendChild(backdrop);
    }

    function closeAuthModal() {
      const el = document.getElementById('authModal');
      if (el) el.remove();
    }

    function submitAuth(mode) {
      const username = document.getElementById('authUsername').value.trim();
      const password = document.getElementById('authPassword').value;
      const errEl = document.getElementById('authError');
      let err;
      if (mode === 'login') err = loginUser(username, password);
      else err = registerUser(username, password);
      if (err) {
        errEl.textContent = err;
        errEl.style.display = 'block';
      } else {
        closeAuthModal();
        renderPage();
      }
    }

    // ==================== DATA LOADING ====================
    async function loadData() {
      try {
        const [matchesRes, syncRes] = await Promise.all([
          fetch('./data/matches-current.json?v=' + Date.now()),
          fetch('./data/sync-meta.json?v=' + Date.now())
        ]);
        matchesData = await matchesRes.json();
        syncMeta = await syncRes.json();
        settleChallenges(); // 数据更新后自动结算命中挑战
        renderPage();
      } catch (err) {
        console.error('Failed to load current data:', err);
      }
    }

    // 结算命中挑战: 检查已提交的竞猜中是否有比赛已结束
    function settleChallenges() {
      const user = getCurrentUser();
      if (!user) return;
      const userData = getUserData(user);
      if (!userData.challenges.length) return;

      const allMatches = [...matchesData, ...historyData];
      let updated = false;

      userData.challenges.forEach(entry => {
        if (entry.settled) return; // 已结算的跳过
        let allDone = true;
        let hitCount = 0;

        entry.selections.forEach(sel => {
          if (sel.result !== null) return; // 已有结果
          const match = allMatches.find(m => m.id === sel.matchId);
          if (match && match.status === 'FINISHED' && match.scoreHome !== null) {
            sel.result = match.scoreHome + '-' + match.scoreAway;
            const actual = match.scoreHome > match.scoreAway ? '1' : match.scoreHome === match.scoreAway ? 'X' : '2';
            sel.isHit = sel.pick === actual;
            if (sel.isHit) hitCount++;
            updated = true;
          } else {
            allDone = false;
          }
        });

        if (allDone && entry.selections.every(s => s.result !== null)) {
          entry.settled = true;
          entry.hitCount = hitCount;
          updated = true;
        }
      });

      if (updated) saveUserData(user, userData);
    }

    async function loadHistoryData() {
      try {
        const res = await fetch('./data/matches-history.json?v=' + Date.now());
        historyData = await res.json();
        // 历史数据加载完成后，如果当前在历史页或详情页，都要重新渲染
        if (currentPage === 'history' || currentPage === 'detail') renderPage();
      } catch (err) {
        console.error('Failed to load history data:', err);
      }
    }

    async function loadWorldCupData() {
      try {
        const res = await fetch('./data/worldcup.json?v=' + Date.now());
        worldcupData = await res.json();
        if (currentPage === 'worldcup') renderPage();
      } catch (err) {
        console.error('Failed to load worldcup data:', err);
      }
    }

    // ==================== INIT ====================
    loadData();
    loadHistoryData();
    loadWorldCupData();
    setInterval(loadData, 30000);
    </script>
  </body>
</html>
